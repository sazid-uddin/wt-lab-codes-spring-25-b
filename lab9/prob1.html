<!DOCTYPE html>
<html lang="en">
<head>
	<title>Document</title>
</head>
<body>
	<form onsubmit="return validate()">
		<input type="text" id="fn" placeholder="First name">
		<input type="text" id="ln" placeholder="Last name">
		<input type="submit">
	</form>	
	<p id="alert" style="color: red;"></p>
	<script>
		function validate() {
			// get user inputs
			const first_name = document.getElementById("fn").value;
			const last_name = document.getElementById("ln").value;

			//validation logic
			// 1st logic: •	Both fields must not be empty
			if (first_name === "" || last_name === "") {
				// error handling

				// show an alert message
				document.getElementById("alert").innerHTML = "Both fields must not be empty";
				// to prevent the form from automatically submitting and refreshing the page
				return false;
			}

			// 2nd logic: •	Each field must have at least 2 characters
			if (first_name.length < 2 || last_name.length < 2) {
				//error handling

				// show an alert message
				document.getElementById("alert").innerHTML = "Each field must have at least 2 characters";
				// to prevent the form from automatically submitting and refreshing the page
				return false;
			}

			return true;
		}
	</script>
</body>
</html>
